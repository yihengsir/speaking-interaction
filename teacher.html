<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>托福口语 AI 课堂 - 教师端 (旗舰版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #f3f4f6; }
    .main-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1rem; }
    .card { background-color: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 60rem; width: 100%; }
    
    .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-online { background-color: #10b981; box-shadow: 0 0 4px #10b981; }
    .status-offline { background-color: #9ca3af; }

    mark { background-color: #ccfbf1; color: #0f766e; padding: 0.15em 0.3em; border-radius: 4px; border-bottom: 2px solid #2dd4bf; text-decoration: none; display: inline-block; line-height: 1.2; }
    .ai-section { margin-top: 1.5rem; border: 1px solid #e5e7eb; border-radius: 0.75rem; overflow: hidden; }
    .ai-header { background-color: #f3f4f6; padding: 0.75rem 1rem; font-weight: 700; color: #374151; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 0.5rem; }
    .ai-body { padding: 1rem; background-color: #fff; }
    
    .score-card { background: linear-gradient(135deg, #ffffff 0%, #fefaff 100%); border: 1px solid #e9d5ff; border-radius: 1rem; padding: 1.5rem; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    @media (min-width: 768px) { .score-card { flex-direction: row; justify-content: space-around; align-items: center; text-align: left; } }
    .score-value { font-size: 2.5rem; font-weight: 800; line-height: 1; margin-bottom: 0.25rem; }
    
    .error-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; table-layout: fixed; }
    .error-table td { padding: 0.75rem; border-bottom: 1px solid #f3f4f6; word-wrap: break-word; }
    .vocab-tag { display: inline-block; background-color: #ecfdf5; color: #047857; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.9rem; margin-right: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #d1fae5; }
    #ai-enhancement { line-height: 2.2; }
    
    .editable-text:focus { outline: 2px solid #6366f1; background-color: #fefce8; }
  </style>
</head>
<body>

<main class="main-container">
  <div class="card">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-chalkboard-teacher mr-2 text-indigo-600"></i>托福口语 AI 课堂</h1>
        <div class="text-right">
            <div id="connection-status-badge" class="text-xs font-bold text-red-500">🔴 未连接</div>
        </div>
    </div>

    <div class="mb-4 bg-yellow-50 border border-yellow-200 rounded-lg p-3 flex gap-2 items-center">
        <i class="fas fa-key text-yellow-600"></i>
        <input type="password" id="api-key-input" class="flex-1 bg-transparent outline-none text-sm" placeholder="输入 Google Gemini API Key" />
        <button onclick="saveApiKey()" class="text-xs bg-yellow-600 text-white px-3 py-1 rounded hover:bg-yellow-700">保存</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="md:col-span-1 bg-indigo-50 p-4 rounded-lg flex flex-col items-center justify-center text-center border border-indigo-100">
            <div id="qrcode" class="bg-white p-2 rounded shadow-sm mb-2"></div>
            <p class="text-xs text-indigo-600 font-mono mb-2" id="classroom-id-display">ID: 初始化中...</p>
            <button onclick="copyStudentLink()" class="bg-white border border-indigo-200 text-indigo-700 text-xs px-3 py-1 rounded hover:bg-indigo-50 transition">
                <i class="fas fa-link mr-1"></i> 复制学生链接
            </button>
        </div>

        <div class="md:col-span-2 flex flex-col gap-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">📌 当前题目 (实时同步)</label>
                <textarea id="topic-input" class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500" rows="2" placeholder="例如: Describe a time you were busy..." oninput="broadcastTopic()"></textarea>
            </div>
            
            <div class="bg-gray-50 rounded-lg p-3 border border-gray-200 min-h-[60px]">
                <h4 class="text-xs font-bold text-gray-500 uppercase mb-2">在线学生</h4>
                <div id="student-list" class="flex flex-wrap gap-2">
                    <span class="text-gray-400 text-sm italic">等待连接...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-8">
        <h3 class="font-bold text-gray-800 mb-3 border-l-4 border-indigo-500 pl-3">📥 提交记录</h3>
        <div id="submissions-list" class="space-y-3"></div>
    </div>

    <div id="analysis-panel" class="hidden border-t-4 border-indigo-100 pt-6 animate-fade-in relative">
        <button onclick="closeAnalysisPanel()" class="absolute top-0 right-0 mt-6 text-gray-400 hover:text-red-500 transition" title="结束当前点评">
            <i class="fas fa-times-circle text-2xl"></i>
        </button>

        <div class="text-center mb-6">
             <h2 class="text-2xl font-bold text-gray-800">📊 AI 深度分析报告</h2>
             <p class="text-sm text-gray-500">学员: <span id="current-analysis-student" class="font-bold text-indigo-600">--</span></p>
        </div>

        <div id="score-panel" class="hidden score-card">
           <div class="text-center px-4">
               <div class="score-value text-indigo-600" id="score-val">--</div>
               <div class="text-xs font-bold text-gray-500 uppercase">TOEFL Score (0-6)</div>
           </div>
           <div class="text-center px-4">
               <div class="score-value text-purple-600" id="cefr-val">--</div>
               <div class="text-xs font-bold text-gray-500 uppercase">CEFR Level</div>
           </div>
           <div class="flex-1 px-4 text-sm text-gray-600 italic leading-relaxed text-center md:text-left" id="score-reason"></div>
        </div>

        <div class="ai-section border-red-200">
          <div class="ai-header bg-red-50 text-red-800"><i class="fas fa-bug"></i> 语法纠错详情</div>
          <div class="ai-body p-0 overflow-x-auto">
             <table class="error-table">
               <tbody id="ai-error-tbody"></tbody>
             </table>
          </div>
        </div>

        <div class="ai-section border-blue-200">
          <div class="ai-header bg-blue-50 text-blue-800"><i class="fas fa-magic"></i> 地道口语润色</div>
           <div class="ai-body text-gray-700 whitespace-pre-wrap">
             <div id="ai-enhancement" class="text-lg leading-relaxed"></div>
          </div>
        </div>

        <div class="ai-section border-orange-200">
            <div class="ai-header bg-orange-50 text-orange-800"><i class="fas fa-dumbbell"></i> 框架与表达特训</div>
             <div class="ai-body text-gray-700 whitespace-pre-wrap">
               <div id="ai-framework" class="text-lg leading-relaxed bg-orange-50/20 p-4 rounded-lg border border-orange-100"></div>
            </div>
        </div>
        
        <div class="ai-section border-green-200">
          <div class="ai-header bg-green-50 text-green-800"><i class="fas fa-book-open"></i> 词汇与搭配积累</div>
          <div class="ai-body" id="ai-vocab-list"></div>
        </div>

        <div class="ai-section border-purple-200">
          <div class="ai-header bg-purple-50 text-purple-800"><i class="fas fa-star"></i> 满分口语范文</div>
          <div class="ai-body text-gray-700 whitespace-pre-wrap">
              <div id="ai-sample"></div>
          </div>
        </div>

        <div class="mt-8 mb-12 text-center flex flex-col items-center gap-4">
            <button id="btn-send-feedback" onclick="sendFeedbackToStudent()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed w-full md:w-auto">
                <i class="fas fa-paper-plane mr-2"></i> 发送完整报告给学生
            </button>
            <button onclick="closeAnalysisPanel()" class="text-gray-500 hover:text-gray-800 underline text-sm">
                结束点评 (关闭面板)
            </button>
        </div>
    </div>

  </div>
</main>

<script>
  const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';
  let peer = null;
  let students = new Map(); 
  let currentAnalysisData = null;
  let currentStudentUUID = null;
  let currentTransferId = null; 
  let studentLink = "";
  
  let fileChunks = {}; 
  let heartbeatInterval;

  window.addEventListener('load', () => {
      const key = localStorage.getItem('MY_GEMINI_KEY');
      if(key) document.getElementById('api-key-input').value = key;
      initTeacherPeer();
  });

  function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if(key) { localStorage.setItem('MY_GEMINI_KEY', key); alert("Key 已保存"); }
  }

  function initTeacherPeer() {
      peer = new Peer(null, { debug: 1 });
      
      peer.on('open', (id) => {
          document.getElementById('connection-status-badge').innerText = "🟢 服务正常";
          document.getElementById('connection-status-badge').className = "text-xs font-bold text-green-600";
          document.getElementById('classroom-id-display').innerText = `ID: ${id}`;
          
          const baseUrl = window.location.href.replace('teacher.html', 'student.html').split('?')[0];
          const urlObj = baseUrl.endsWith('student.html') ? baseUrl : baseUrl.replace(/[^/]*$/, 'student.html');
          studentLink = `${urlObj}?t=${id}`;
          
          document.getElementById("qrcode").innerHTML = "";
          new QRCode(document.getElementById("qrcode"), { text: studentLink, width: 100, height: 100 });
          
          clearInterval(heartbeatInterval);
          heartbeatInterval = setInterval(() => {
              students.forEach(s => {
                  if(s.status === 'online' && s.conn && s.conn.open) {
                      s.conn.send({ type: 'ping' });
                  }
              });
          }, 20000);
      });

      peer.on('disconnected', () => {
          document.getElementById('connection-status-badge').innerText = "🟡 正在重连...";
          document.getElementById('connection-status-badge').className = "text-xs font-bold text-yellow-500";
          setTimeout(() => { if (!peer.destroyed) peer.reconnect(); }, 2000);
      });

      peer.on('connection', (conn) => {
          conn.on('open', () => { if(conn.metadata?.uuid) registerStudent(conn.metadata.uuid, conn.metadata.name, conn); });
          
          conn.on('data', (data) => {
              if (data.type === 'pong') { }
              if (data.type === 'handshake') registerStudent(data.uuid, data.name, conn);
              
              if (data.type === 'file-start') {
                  fileChunks[data.transferId] = { 
                      chunks: [], 
                      totalSize: data.totalSize,
                      mimeType: data.mimeType,
                      meta: data.meta 
                  };
              }
              if (data.type === 'file-chunk') {
                  if(fileChunks[data.transferId]) {
                      fileChunks[data.transferId].chunks.push(data.chunk);
                  }
              }
              if (data.type === 'file-end') {
                  const transfer = fileChunks[data.transferId];
                  if(transfer) {
                      const completeBlob = new Blob(transfer.chunks, { type: transfer.mimeType });
                      handleSubmission({
                          transferId: data.transferId, 
                          uuid: transfer.meta.uuid,
                          name: transfer.meta.name,
                          text: transfer.meta.text,
                          isHistory: transfer.meta.isHistory,
                          topic: transfer.meta.topic,
                          blob: completeBlob
                      });
                      conn.send({ type: 'ack', transferId: data.transferId });
                      delete fileChunks[data.transferId];
                  }
              }
          });
          
          conn.on('close', () => updateStudentStatus(conn.metadata?.uuid, 'offline'));
          conn.on('error', () => updateStudentStatus(conn.metadata?.uuid, 'offline'));
      });
  }

  function registerStudent(uuid, name, conn) {
      students.set(uuid, { conn: conn, name: name || "未知", status: 'online' });
      conn.metadata = { uuid, name };
      updateStudentUI();
      const topic = document.getElementById('topic-input').value;
      if(topic) conn.send({ type: 'topic', data: topic });
  }

  function updateStudentStatus(uuid, status) {
      if(uuid && students.has(uuid)) { students.get(uuid).status = status; updateStudentUI(); }
  }

  function updateStudentUI() {
      const list = document.getElementById('student-list');
      list.innerHTML = "";
      if(students.size === 0) { list.innerHTML = '<span class="text-gray-400 text-sm italic">等待连接...</span>'; return; }
      students.forEach((s) => {
          const badge = document.createElement('div');
          badge.className = "flex items-center bg-white border border-gray-200 rounded-full px-3 py-1 text-sm shadow-sm";
          const color = s.status === 'online' ? 'bg-green-500' : 'bg-gray-400';
          badge.innerHTML = `<span class="status-dot ${color}"></span><span class="font-bold text-gray-700">${s.name}</span>`;
          list.appendChild(badge);
      });
  }

  function copyStudentLink() {
      if(!studentLink) return alert("链接未生成");
      navigator.clipboard.writeText(studentLink).then(() => alert("已复制链接"));
  }

  function broadcastTopic() {
      const topic = document.getElementById('topic-input').value;
      students.forEach(s => { if(s.status === 'online' && s.conn.open) s.conn.send({ type: 'topic', data: topic }); });
  }

  function handleSubmission(data) {
      const container = document.getElementById('submissions-list');
      const audioUrl = URL.createObjectURL(data.blob);
      const id = data.transferId; 
      
      const historyBadge = data.isHistory 
          ? '<span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded ml-2 border border-yellow-300 shadow-sm"><i class="fas fa-history"></i> 历史补交</span>' 
          : '<span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded ml-2 border border-green-300 shadow-sm"><i class="fas fa-bolt"></i> 实时提交</span>';
      
      const borderClass = data.isHistory ? "border-yellow-300 bg-yellow-50/40" : "border-gray-200 bg-white";
      const topicDisplay = data.topic ? `<div class="text-xs text-indigo-600 font-bold mb-2 bg-indigo-50 border border-indigo-100 inline-block px-2 py-1 rounded">📌 练习题目: ${data.topic}</div>` : '';

      const item = document.createElement('div');
      item.id = `sub-${id}`;
      item.className = `p-4 rounded-lg border shadow-sm flex flex-col md:flex-row gap-4 items-start animate-fade-in ${borderClass}`;
      
      const safeTopic = (data.topic || '').replace(/'/g, "&apos;").replace(/"/g, "&quot;");

      item.innerHTML = `
        <div class="flex-1 w-full">
            <div class="flex justify-between items-center mb-2">
                <div>
                    <span class="font-bold text-indigo-700 text-lg">${data.name}</span>
                    ${historyBadge}
                </div>
                <span class="text-xs text-gray-400">${new Date().toLocaleTimeString()}</span>
            </div>
            ${topicDisplay}
            <div class="text-xs text-gray-400 mb-1"><i class="fas fa-pen"></i> 如有识别错误，可点击下方文本修改后再点评：</div>
            <div id="text-${id}" class="editable-text bg-white/70 p-3 rounded text-gray-800 text-base mb-2 border border-gray-200" contenteditable="true">${data.text || "(未识别到文本)"}</div>
            
            <audio controls src="${audioUrl}" class="w-full h-8 bg-gray-100 rounded"></audio>
        </div>
        <div class="flex flex-col gap-2 mt-2 md:mt-0">
             <button onclick="triggerAnalysis('${data.uuid}', '${id}', '${data.name}', '${safeTopic}')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded shadow transition">
                <i class="fas fa-magic mr-1"></i> AI 深度点评
             </button>
             <button onclick="deleteSubmission('sub-${id}')" class="bg-red-50 hover:bg-red-100 text-red-500 text-sm px-4 py-2 rounded transition border border-red-100">
                <i class="fas fa-trash"></i>
             </button>
        </div>
      `;
      container.prepend(item);
  }

  function deleteSubmission(id) { document.getElementById(id)?.remove(); }

  async function triggerAnalysis(uuid, subId, name, historicalTopic) {
      const textEl = document.getElementById(`text-${subId}`);
      const text = textEl.innerText.trim();
      
      // If the submission has a specific topic (offline mode), use that. Otherwise use current global topic.
      const topic = historicalTopic || document.getElementById('topic-input').value;
      
      currentStudentUUID = uuid;
      currentTransferId = subId; 
      document.getElementById('current-analysis-student').innerText = name;
      
      const panel = document.getElementById('analysis-panel');
      panel.classList.remove('hidden');
      panel.scrollIntoView({ behavior: 'smooth' });
      
      document.getElementById('score-panel').classList.add('hidden');
      document.getElementById('ai-error-tbody').innerHTML = "";
      document.getElementById('ai-enhancement').innerText = "AI 思考中...";
      document.getElementById('ai-sample').innerText = "";
      
      const btn = document.getElementById('btn-send-feedback');
      btn.disabled = true;

      const apiKey = localStorage.getItem('MY_GEMINI_KEY');
      if(!apiKey) return alert("请先设置 API Key");

     const prompt = `
        Role: Fair and Precise TOEFL Speaking Rater.
        Task: Analyze the student's speech based on the provided topic and the official ETS "Take an Interview" scoring rubric.
        Topic: "${topic}"
        Student Speech: "${text}"

        **CRITICAL INSTRUCTIONS & SCORING RUBRIC (Raw Scale 0-5):**
        First, evaluate the response using the following raw rubric:
        * Score 5 (Fully successful): On topic, well elaborated. Good pace, natural pauses. Intelligible pronunciation. Accurate grammar/vocab allows precise meanings. (Occasional minor errors allowed).
        * Score 4 (Generally successful): On topic, elaborated, but lacks some connectors. Good pace, minor pausing. Intelligible, adequate grammar/vocabulary.
        * Score 3 (Partially successful): On topic but limited elaboration. Choppy pace, frequent pauses/fillers. Pronunciation inaccuracies affect intelligibility. Limited grammar/vocab restricts precision.
        * Score 2 (Mostly unsuccessful): Minimally connected, little relevant elaboration. Limited intelligibility. Very limited grammar/vocabulary.
        * Score 1 (Unsuccessful): Vaguely connected. Mostly unintelligible. Isolated words/phrases.
        * Score 0: No response, unintelligible, no English, or completely off-topic.

        **CONVERSION TO 0-6 REPORTING SCALE & STRICT CEFR MAPPING:**
        1. Convert the raw score to the final reporting scale of 0 to 6.0. 
        2. STRICTLY map the converted score to the appropriate CEFR level based on these rules:
           - 5.5 to 6.0 -> "C1" (Advanced)
           - 4.0 to 5.0 -> "B2" (High-Intermediate)
           - 3.0 to 3.5 -> "B1" (Low-Intermediate)
           - 1.5 to 2.5 -> "A2" (Basic)
           - 0.0 to 1.0 -> "A1" (Beginner)
        Your final \`estimated_score\` MUST be on the 0-6 scale, and the \`cefr_level\` MUST strictly follow the mapping above.

        Provide output in EXACT JSON format. Do not use markdown blocks (like \`\`\`json) in the final output.

        JSON Schema:
        {
            "estimated_score": 5.5,
            "cefr_level": "C1",
            "score_rationale": "Brief assessment summary explaining the raw performance (Delivery, Language Use, Elaboration) and its final converted score.",
            "error_table": [ { "original": "error", "fixed": "correction", "type": "Grammar/Pronunciation/Vocab" } ],
            "expression_enhancement": "Native version with <mark>highlights</mark>.",
            "framework_practice": "Cloze test version replacing <mark> content with [____] <span class='cloze-hint'>(Chinese Meaning)</span>.",
            "vocabulary": [ { "phrase": "word", "definition": "def" } ],
            "sample_answer": "Score 6.0 model answer demonstrating natural pacing, elaboration, and accurate vocabulary."
        }
      `;

      try {
          const res = await fetch(`${GEMINI_API_URL}?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const raw = await res.json();
          const jsonStr = raw.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
          const result = JSON.parse(jsonStr);
          
          renderAnalysis(result);
          currentAnalysisData = result;
          btn.disabled = false;

      } catch(e) {
          console.error(e);
          alert("AI 分析失败: " + e.message);
          btn.disabled = false;
      }
  }

  function renderAnalysis(data) {
      const scorePanel = document.getElementById('score-panel');
      scorePanel.classList.remove('hidden');
      scorePanel.classList.add('flex');
      document.getElementById('score-val').innerText = data.estimated_score;
      document.getElementById('cefr-val').innerText = data.cefr_level;
      document.getElementById('score-reason').innerText = data.score_rationale;
      
      const tbody = document.getElementById('ai-error-tbody');
      tbody.innerHTML = "";
      if(data.error_table && data.error_table.length) {
          data.error_table.forEach(e => {
              tbody.innerHTML += `<tr><td class="text-red-700 bg-red-50/30"><del>${e.original}</del></td><td class="text-green-700 font-medium">${e.fixed}</td><td class="text-gray-600 text-sm">${e.type}</td></tr>`;
          });
      } else {
          tbody.innerHTML = `<tr><td colspan="3" class="text-center text-gray-500 p-2">🎉 无明显语法错误。</td></tr>`;
      }

      document.getElementById('ai-enhancement').innerHTML = data.expression_enhancement || "无";
      document.getElementById('ai-framework').innerHTML = data.framework_practice || "无";
      const vocabDiv = document.getElementById('ai-vocab-list');
      vocabDiv.innerHTML = "";
      (data.vocabulary || []).forEach(v => {
          vocabDiv.innerHTML += `<div class="vocab-tag"><strong>${v.phrase}</strong> <span class="text-xs opacity-80 border-l border-green-300 pl-2 ml-1">${v.definition}</span></div>`;
      });
      document.getElementById('ai-sample').innerHTML = data.sample_answer || "无";
  }

  function sendFeedbackToStudent() {
      const student = students.get(currentStudentUUID);
      if(student && student.conn.open) {
          student.conn.send({ type: 'feedback', transferId: currentTransferId, data: currentAnalysisData });
          alert("✅ 完整报告已发送给 " + student.name);
      } else {
          alert("❌ 发送失败：学生已离线");
      }
  }

  function closeAnalysisPanel() {
      document.getElementById('analysis-panel').classList.add('hidden');
      currentAnalysisData = null;
      currentStudentUUID = null;
      currentTransferId = null;
      window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
